name: AI PR Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=50
          DIFF=$(git diff "origin/${{ github.event.pull_request.base.ref }}"...HEAD -- . ':(exclude)*.lock' ':(exclude)*.svg' | head -c 12000)
          {
            echo 'diff<<EOF_DIFF'
            echo "$DIFF"
            echo 'EOF_DIFF'
          } >> "$GITHUB_OUTPUT"

      - name: Request AI review
        id: review
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        with:
          script: |
            const diff = process.env.PR_DIFF || '';
            const title = process.env.PR_TITLE || '';
            const body = process.env.PR_BODY || '';

            if (!diff.trim()) {
              core.setOutput('review', 'Kein relevanter Diff gefunden (evtl. nur Lock-Dateien oder Binaries geaendert).');
              return;
            }

            const systemPrompt = [
              'Du bist ein erfahrener Code-Reviewer.',
              'Fasse den folgenden Pull-Request-Diff kurz zusammen:',
              '1. Was wurde geaendert (2-4 Saetze, sachlich).',
              '2. Moegliche Risiken oder Dinge, die ein Reviewer pruefen sollte (Bulletpoints, max 5).',
              '3. Code-Qualitaet / Stil-Hinweise, falls relevant (optional, max 3 Bulletpoints).',
              'Antworte auf Deutsch, in Markdown, ohne Einleitungssatz wie "Hier ist die Zusammenfassung".',
              'Sei knapp. Keine Erfindungen ueber Code, der nicht im Diff steht.'
            ].join(' ');

            const userPrompt = 'PR Titel: ' + title + '\n\nPR Beschreibung:\n' + body + '\n\nDiff:\n' + diff;

            const payload = JSON.stringify({
              model: 'gpt-4o-mini',
              messages: [
                { role: 'system', content: systemPrompt },
                { role: 'user', content: userPrompt }
              ],
              temperature: 0.2,
              max_tokens: 700
            });

            const response = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + process.env.OPENAI_API_KEY
              },
              body: payload
            });

            if (!response.ok) {
              const errText = await response.text();
              core.setOutput('review', 'AI-Review fehlgeschlagen (HTTP ' + response.status + '). Details im Workflow-Log.');
              core.setFailed('OpenAI API error: ' + response.status + ' ' + errText);
              return;
            }

            const data = await response.json();
            const text = data.choices && data.choices[0] && data.choices[0].message
              ? data.choices[0].message.content
              : 'Keine Antwort von der API erhalten.';

            core.setOutput('review', text);

      - name: Comment on PR
        uses: actions/github-script@v7
        env:
          REVIEW_TEXT: ${{ steps.review.outputs.review }}
        with:
          script: |
            const reviewText = process.env.REVIEW_TEXT || 'Kein Review-Text verfuegbar.';
            const marker = '<!-- ai-pr-reviewer -->';
            const body = marker + '\n## AI PR Review\n\n' + reviewText;

            const commentsResp = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const comments = commentsResp.data;
            let existing = null;
            for (let i = 0; i < comments.length; i++) {
              if (comments[i].body.indexOf(marker) !== -1) {
                existing = comments[i];
                break;
              }
            }

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
